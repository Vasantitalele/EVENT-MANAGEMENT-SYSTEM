<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor Portal | Eventify</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body class="admin-body">

    <nav class="sidebar">
        <div class="brand">
            <i class="fa-solid fa-shop neon-icon" style="font-size: 1.5rem;"></i>
            <h2 style="font-size: 1.5rem;">Vendor Panel</h2>
            <p id="vendorNameDisplay" style="color: var(--text-muted); margin-top:5px; font-size:0.9rem;">Loading...</p>
        </div>
        <ul class="sidebar-menu">
            <li><a href="#" class="active"><i class="fa-solid fa-chart-line"></i> Market Insights</a></li>
            <li><a href="#" id="logoutBtn" style="color: #ff4757; margin-top: 50px;"><i class="fa-solid fa-right-from-bracket"></i> Logout</a></li>
        </ul>
    </nav>

    <main class="main-content">
        <div class="header-flex">
            <h2>Live Event Stats</h2>
        </div>
        <p style="color:var(--text-muted); margin-bottom:20px;">Select an event to see verified student counts and submit your quotation.</p>

        <div id="vendorEventContainer" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px;">
            </div>

        <div id="quoteModal" class="glass-card hidden" style="position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); z-index:100; width:90%; max-width:500px;">
            <h3 style="color:var(--accent); margin-bottom:20px;">Submit Quotation for <span id="quoteEventName">...</span></h3>
            <form id="quoteForm">
                <input type="hidden" id="quoteEventId">
                <div class="input-group">
                    <i class="fa-solid fa-indian-rupee-sign"></i>
                    <input type="number" id="quoteAmount" placeholder="Your Total Quote (₹)" required>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-comment-dots"></i>
                    <textarea id="quoteMessage" placeholder="Describe your services (e.g., 200 Meals, 50 Chairs)" required style="width:100%; height:100px; background:rgba(0,0,0,0.2); border:1px solid rgba(255,255,255,0.1); border-radius:12px; color:white; padding:15px; outline:none; font-family:inherit;"></textarea>
                </div>
                <button type="submit" class="btn-primary" id="submitQuoteBtn">Send Quote to Admin</button>
                <button type="button" onclick="closeQuoteModal()" style="width:100%; background:none; border:none; color:var(--text-muted); margin-top:10px; cursor:pointer;">Cancel</button>
            </form>
        </div>
        <div id="quoteOverlay" class="hidden" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:99;"></div>
    </main>

    <script src="vendor.js"></script>
</body>
</html>
